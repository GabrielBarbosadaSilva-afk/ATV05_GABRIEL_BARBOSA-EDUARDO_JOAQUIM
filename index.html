<!-- Aluno: Eduardo Joaquim Santos da Silva | ATV04 | Turma: 513 -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Currículo - Eduardo Joaquim</title>
    <!-- Favicon personalizado armazenado dentro da pasta img -->
    <link rel="icon" type="image/png" href="img/favicon.png">

    <style>
        /* Reseta margens e padding padrão do navegador */
        body {
            margin: 0;
            padding: 0;
            background-color: #e8eef2;
            font-family: "Georgia", "Times New Roman", serif;
            color: #1d1d1d;
        }

        /* ID #pagina: container mestre que envolve toda a estrutura.
           Define a largura total do site, centraliza na tela
           e aplica a borda azul-marinho externa. */
        #pagina {
            width: 90%;
            margin: 20px auto;
            border: 3px solid #0b2545;
        }

        /* ID #topo: cabeçalho do site com nome e subtítulo.
           Fundo azul-marinho com texto amarelo dourado. */
        #topo {
            background-color: #0b2545;
            color: #ffd166;
            text-align: center;
            padding: 25px;
            font-family: "Verdana", sans-serif;
        }

        /* Título h1 dentro do #topo */
        #topo h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: 2px;
        }

        /* Subtítulo p dentro do #topo */
        #topo p {
            margin: 8px 0 0 0;
            font-style: italic;
            font-size: 16px;
        }

        /* ID #meio: div que contém o menu e o conteúdo lado a lado.
           overflow:hidden faz esta div envolver os filhos com float,
           evitando o colapso de altura do #pagina. */
        #meio {
            overflow: hidden;
        }

        /* ID #menu: barra lateral de navegação.
           float:left posiciona o menu à esquerda.
           width:22% define a largura sem padding horizontal,
           garantindo que 22% + 78% do #conteudo = 100% sem overflow. */
        #menu {
            float: left;
            width: 22%;
            background-color: #1d3557;
            color: #ffffff;
            min-height: 620px;
        }

        /* Título h3 do menu: o padding lateral fica aqui,
           no filho, e não no #menu, evitando cálculos de largura. */
        #menu h3 {
            color: #ffd166;
            border-bottom: 2px solid #ffd166;
            padding: 15px 15px 6px 15px;
            margin: 0;
            font-family: "Verdana", sans-serif;
        }

        /* Lista de links dentro do #menu */
        #menu ul {
            list-style: square;
            padding-left: 30px;
            padding-right: 10px;
            line-height: 2;
            margin: 0;
        }

        /* ID #conteudo: área principal onde o iframe é exibido.
           float:left posiciona esta div à direita do #menu.
           width:78% ocupa o espaço restante (22% + 78% = 100%). */
        #conteudo {
            float: left;
            width: 78%;
            background-color: #ffffff;
        }

        /* Iframe dentro do #conteudo: ocupa toda a largura
           da div com altura suficiente para exibir o conteúdo. */
        #conteudo iframe {
            display: block;
            width: 100%;
            height: 620px;
            border: none;
        }

        /* ID #rodape: rodapé do site.
           clear:both garante que fique abaixo dos floats
           do #menu e do #conteudo. */
        #rodape {
            clear: both;
            background-color: #0b2545;
            color: #ffffff;
            text-align: center;
            padding: 15px;
            font-size: 14px;
            font-family: "Verdana", sans-serif;
        }

        /* Link dentro do #rodape */
        #rodape a {
            color: #ffd166;
            text-decoration: none;
            font-weight: bold;
        }

        /* Hover do link do #rodape */
        #rodape a:hover {
            text-decoration: underline;
        }

        /* Classe .foto-perfil: estiliza a foto do aluno na barra
           lateral com formato circular e moldura dourada. */
        .foto-perfil {
            display: block;
            margin: 20px auto 0 auto;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 4px solid #ffd166;
            object-fit: cover;
        }

        /* Classe .link-menu: aparência dos links do menu lateral.
           Aplicada nos links internos e no link externo do menu. */
        .link-menu {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
        }

        /* Hover da classe .link-menu */
        .link-menu:hover {
            color: #ffd166;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- div#pagina: container mestre de toda a página.
         Substitui a antiga <table class="mestre">. -->
    <div id="pagina">

        <!-- div#topo: cabeçalho do site.
             Substitui o antigo <td class="header" colspan="2">. -->
        <div id="topo">
            <h1>EDUARDO JOAQUIM SANTOS DA SILVA</h1>
            <p>Estudante de Informática &middot; Buscando estágio em TI</p>
        </div>

        <!-- div#meio: envolve o menu e o conteúdo lado a lado.
             O overflow:hidden contém os floats dos filhos. -->
        <div id="meio">

            <!-- div#menu: barra lateral de navegação.
                 Substitui o antigo <td class="menu">.
                 float:left a posiciona à esquerda do conteúdo. -->
            <div id="menu">

                <!-- Foto de perfil com classe .foto-perfil.
                     Atributos src, alt e title obrigatórios. -->
                <img class="foto-perfil"
                     src="img/perfil.png"
                     alt="Foto de perfil de Eduardo Joaquim"
                     title="Eduardo Joaquim - Aluno do IFAL">

                <h3>Menu</h3>
                <ul>
                    <!-- Link interno: target="conteudo" abre curriculo.html
                         dentro do iframe (name="conteudo"), sem
                         recarregar a página principal. -->
                    <li>
                        <a class="link-menu"
                           href="curriculo.html"
                           target="conteudo"
                           title="Abrir o Currículo no painel de conteúdo">Currículo</a>
                    </li>
                    <!-- Link interno: abre tema.html dentro do mesmo iframe. -->
                    <li>
                        <a class="link-menu"
                           href="tema.html"
                           target="conteudo"
                           title="Abrir o Tema Livre no painel de conteúdo">Tema Livre</a>
                    </li>
                    <!-- Link externo com target="_blank": abre o site
                         do IFAL em nova aba, fora do site e do iframe. -->
                    <li>
                        <a class="link-menu"
                           href="https://www2.ifal.edu.br/"
                           target="_blank"
                           title="Visitar o site oficial do IFAL (abre em nova aba)">Site do IFAL</a>
                    </li>
                </ul>
            </div>

            <!-- div#conteudo: área principal com o iframe.
                 Substitui o antigo <td class="conteudo">.
                 float:left a posiciona à direita do #menu. -->
            <div id="conteudo">
                <!-- iframe principal:
                     src="curriculo.html" → carrega o currículo por padrão
                     name="conteudo"      → alvo dos links target="conteudo"
                     title              → obrigatório para acessibilidade -->
                <iframe src="curriculo.html"
                        name="conteudo"
                        title="Área de conteúdo: exibe o currículo ou o tema livre">
                </iframe>
            </div>

        </div><!-- fim de #meio -->

        <!-- div#rodape: rodapé do site.
             Substitui o antigo <td class="footer" colspan="2">.
             clear:both no CSS garante que fique abaixo dos floats. -->
        <div id="rodape">
            &copy; 2026 - Eduardo Joaquim Santos da Silva &middot; Turma 523 &middot;
            <a href="https://www2.ifal.edu.br/"
               target="_blank"
               title="Site oficial do IFAL (abre em nova aba)">IFAL - Campus Palmeira dos Índios</a>
        </div>

    </div><!-- fim de #pagina -->

</body>
</html>
