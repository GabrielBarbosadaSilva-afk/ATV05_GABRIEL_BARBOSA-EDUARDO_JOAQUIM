<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFrame</title>

    <link rel="shortcut icon" href="imagens/iframe.ico" type="image/x-icon">

    <style>

        /* Define o fundo da página e a fonte pricipal*/
        body{
            background-image: url(imagens/background-image.jpg);
            font-family: Arial;
        }

        /* Define a área principal do site */
        #container{
            width: 80%;
            margin: auto;
        }

        /* Estiliza o topo da página */
        #topo{
            background-color: #c44444;
            border: 2px solid black;
            text-align: center;
            padding: 10px;
        }

        /* Define a área lateral do menu */
        #menu{
            width: 23%;
            height: 730px;
            display: inline-block;
            background-color: #c44444;
            border: 2px solid black;
            text-align: center;
            vertical-align: top;
        }

        /* Define a área principal do conteúdo */
        #conteudo{
            width: 73%;
            display: inline-block;
            border: 2px solid black;
            background-color: aliceblue;
            text-align: center;
            vertical-align: top;
        }

        /* Estiliza o rodapé */
        #rodape{
            background-color: #c44444;
            border: 2px solid black;
            text-align: center;
            padding: 10px;
        }

        /* ajusta a margem da div principal */
        .principal{
            margin-top: 0px;
        }

        /* Estiliza os títulos */
        .titulo{
            color: black;
        }

        /* Estiliza os links do menu */
        .link-menu{
            color: black;
        }

        /* Remove o marcador da lista */
        .lista-menu{
            list-style-type: none;
            padding: 0px;
        }

    </style>

</head>

<body>

    <div class="principal" id="container">

        <div id="topo">
            <h1 class="titulo">Página Principal</h1>
        </div>

        <div id="menu">

            <h2 class="titulo">Projetos</h2>

            <ul class="lista-menu">

                <li>
                    <a href="curriculo_GB.html"
                    target="principal"
                    title="Página Currículo"
                    class="link-menu">
                    Currículo
                    </a>
                </li>

                <br>

                <li>
                    <a href="temaLivre_GB.html"
                    target="principal"
                    title="Página God of War 2"
                    class="link-menu">
                    God of War 2
                    </a>
                </li>

            </ul>

        </div>

        <div id="conteudo">

            <iframe
            src="curriculo_GB.html"
            name="principal"
            title="Área de conteúdo"
            width="100%"
            height="720"
            frameborder="0">
            </iframe>

        </div>

        <div id="rodape">
            <p>Desenvolvido por Gabriel Barbosa da Silva & Eduardo Joaquim Santos Silva</p>
        </div>

    </div>

</body>

</html>
